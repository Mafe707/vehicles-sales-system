<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Vehicle Sales System</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body class="auth-body">

<div class="auth-container">

  <div class="auth-left">
    <div class="overlay"></div>
    <div class="brand-content">
      <div class="brand-logo">
        <i class="fa-solid fa-car-rear"></i>
      </div>
      <h1>Vehicle Sales System</h1>
      <p>Modern platform for vehicle inventory, users, brands and sales management.</p>
      <div class="feature-list">
        <div><i class="fa-solid fa-check"></i> Inventory Management</div>
        <div><i class="fa-solid fa-check"></i> Sales Analytics</div>
        <div><i class="fa-solid fa-check"></i> User Administration</div>
        <div><i class="fa-solid fa-check"></i> Reports & Insights</div>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Sign in to continue</p>
      </div>

      <form id="loginForm">
        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="mafe@example.com">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••">
        </div>
        <div class="input-group">
          <label>Mobile Phone</label>
          <input type="tel" placeholder="+57 300 123 4567">
        </div>
        <div class="auth-options">
          <label>
            <input type="checkbox">
            Remember me
          </label>
          <a href="#">Forgot password?</a>
        </div>
        <button class="primary-btn" type="submit">LOGIN</button>
      </form>

      <div class="auth-footer">
        Don't have an account?
        <a href="register.html">Register</a>
      </div>
    </div>
  </div>

</div>

<script src="js/main.js"></script>
</body>
</html>
