<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body class="auth-body">

<div class="auth-container">

  <div class="auth-left">
    <div class="overlay"></div>
    <div class="brand-content">
      <div class="brand-logo">
        <i class="fa-solid fa-car-rear"></i>
      </div>
      <h1>Create Your Account</h1>
      <p>Manage vehicles, brands, users and sales from a single dashboard.</p>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Create Account</h2>
        <p>Join Vehicle Sales System</p>
      </div>

      <form id="registerForm">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" placeholder="Mafe Revelo">
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="mafe@example.com">
        </div>
        <div class="input-group">
          <label>Phone</label>
          <input type="tel" placeholder="+57 300 123 4567">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••">
        </div>
        <div class="input-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="••••••••">
        </div>
        <button class="primary-btn" type="submit">REGISTER</button>
      </form>

      <div class="auth-footer">
        Already have an account?
        <a href="index.html">Login</a>
      </div>
    </div>
  </div>

</div>

<script src="js/main.js"></script>
</body>
</html>
