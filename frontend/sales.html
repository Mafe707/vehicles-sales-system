<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

<div class="dashboard-layout">

  <aside class="sidebar">
    <div class="sidebar-top">
        <div class="logo-box"><i class="fa-solid fa-car-rear"></i></div>
        <h2>Vehicle Sales</h2>
    </div>
    <nav class="sidebar-menu">
        <a class="menu-item" href="dashboard.html">
        <i class="fa-solid fa-house"></i><span>Dashboard</span>
        </a>
        <a class="menu-item" href="vehicles.html">
        <i class="fa-solid fa-car-side"></i><span>Vehicles</span>
        </a>
        <a class="menu-item" href="brands.html">
        <i class="fa-solid fa-tags"></i><span>Brands</span>
        </a>
        <a class="menu-item" href="users.html">
        <i class="fa-solid fa-users"></i><span>Users</span>
        </a>
        <a class="menu-item active" href="sales.html">
        <i class="fa-solid fa-chart-line"></i><span>Sales</span>
        </a>
        <a class="menu-item" href="reports.html">
        <i class="fa-solid fa-chart-pie"></i><span>Reports</span>
        </a>
        <a class="menu-item" href="settings.html">
        <i class="fa-solid fa-gear"></i><span>Settings</span>
        </a>
    </nav>
    </aside>

  <main class="main-area">

    <div class="topbar">
        <div>
            <h1>Sales</h1>
            <p>Vehicle sales transactions</p>
        </div>
        <div class="topbar-actions">
            <button class="secondary-btn"><i class="fa-solid fa-bell"></i></button>
            <div class="user-profile" onclick="window.location.href='settings.html'">
            <div class="user-avatar"><i class="fa-solid fa-user"></i></div>
            <div class="user-info">
                <span class="user-name">Mafe Revelo</span>
            </div>
            </div>
            <button class="danger-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Sale ID</th>
            <th>Vehicle</th>
            <th>Customer</th>
            <th>Date</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>#SALE-001</td>
            <td>Toyota Corolla</td>
            <td>Juan Perez</td>
            <td>2025-01-15</td>
            <td>$18,500</td>
            <td><span class="badge success">Completed</span></td>
          </tr>
          <tr>
            <td>#SALE-002</td>
            <td>Honda CRV</td>
            <td>Maria Gomez</td>
            <td>2025-01-17</td>
            <td>$22,900</td>
            <td><span class="badge warning">Pending</span></td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

</body>
</html>
